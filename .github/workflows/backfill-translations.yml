name: Backfill Translations (MiniMax)

on:
  workflow_dispatch:
    inputs:
      limit:
        type: number
        description: 'Max reports to process (0 = all)'
        required: false
        default: 0
      date:
        type: string
        description: 'Single report date (YYYY.MM.DD), leave empty for batch'
        required: false
        default: ''
      dry_run:
        type: boolean
        description: 'Dry run (print only, no DB writes)'
        required: false
        default: false

permissions:
  contents: read
  issues: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Just under 2 hours
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backfill
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        MONGO_USER: ${{ secrets.MONGO_USER }}
        MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        INPUT_DATE: ${{ inputs.date }}
        INPUT_LIMIT: ${{ inputs.limit }}
        INPUT_DRY_RUN: ${{ inputs.dry_run }}
      run: |
        ARGS=""
        if [ -n "$INPUT_DATE" ]; then
          ARGS="$ARGS --date $INPUT_DATE"
        fi
        # For scheduled runs, inputs are empty so limit defaults to 0 (all)
        if [ -n "$INPUT_LIMIT" ] && [ "$INPUT_LIMIT" != "0" ]; then
          ARGS="$ARGS --limit $INPUT_LIMIT"
        fi
        if [ "$INPUT_DRY_RUN" = "true" ]; then
          ARGS="$ARGS --dry-run"
        fi
        python backfill_translations.py $ARGS

  notify:
    runs-on: ubuntu-latest
    needs: backfill
    if: always()
    steps:
    - name: Create completion issue
      if: needs.backfill.result == 'success'
      uses: actions/github-script@v6
      with:
        script: |
          // Check if there's already an open completion issue
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'backfill-complete'
          });

          if (issues.data.length === 0) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Backfill Translation Run Completed',
              body: `A backfill translation run completed successfully.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the run logs for the summary (items translated, skipped, etc.).\n\n**Once all reports are backfilled, disable the cron schedule in \`.github/workflows/backfill-translations.yml\` by removing the \`schedule\` block.**`,
              labels: ['backfill-complete', 'automated']
            });
          }

    - name: Create failure issue
      if: needs.backfill.result == 'failure'
      uses: actions/github-script@v6
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'backfill-failure'
          });

          if (issues.data.length === 0) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Backfill Translation Failed - ${date}`,
              body: `The backfill translation workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThe next scheduled run will retry automatically. Check the logs for errors.`,
              labels: ['backfill-failure', 'automated']
            });
          }
