name: Daily Scraper

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the workflow with debug logging'
        required: false
        default: false
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

permissions:
  contents: read
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      run: python main.py

    - name: Ping Healthchecks.io (success)
      if: success()
      env:
        HC_PING_URL: ${{ secrets.HC_PING_URL }}
      run: curl -fsS -m 10 --retry 5 "$HC_PING_URL" > /dev/null

    - name: Ping Healthchecks.io (failure)
      if: failure()
      env:
        HC_PING_URL: ${{ secrets.HC_PING_URL }}
      run: curl -fsS -m 10 --retry 5 "$HC_PING_URL/fail" > /dev/null

    - name: Debug logs
      if: inputs.debug_enabled
      run: |
        echo "Debug logs enabled"
        cat debug.log || echo "No debug.log found"
        cat scraping.log || echo "No scraping.log found"

    - name: Create failure issue
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          const title = `Daily Scraper Failed - ${date}`;

          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'workflow-failure'
          });

          const existingIssue = issues.data.find(i => i.title.includes('Daily Scraper Failed'));

          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `The Daily Scraper workflow failed on ${date}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and resolve the issue.`,
              labels: ['workflow-failure', 'automated']
            });
          }
