name: Daily Scraper

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the workflow with debug logging'
        required: false
        default: false
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env file
      run: |
        echo "MONGO_USER=${{ secrets.MONGO_USER }}" >> .env
        echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}" >> .env
        echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
        echo "MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}" >> .env
        echo "MONGO_COLLECTION_URLS=${{ secrets.MONGO_COLLECTION_URLS }}" >> .env

    - name: Load .env file
      uses: xom9ikk/dotenv@v2

    - name: Run scraper
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        MONGO_USER: ${{ secrets.MONGO_USER }}
        MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
        MONGO_COLLECTION_URLS: ${{ secrets.MONGO_COLLECTION_URLS }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      run: python main.py

    - name: Check for changes
      id: git-check
      run: |
        git status --porcelain
        echo "changes=$(git status --porcelain)" >> $GITHUB_OUTPUT

    - name: Commit changes
      if: steps.git-check.outputs.changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update data from daily scraper run"

    - name: Push changes
      if: steps.git-check.outputs.changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}

    - name: Debug logs
      if: ${{ inputs.debug_enabled }}
      run: |
        echo "Debug logs enabled"
        cat debug.log || echo "No debug.log found"
        cat scraping.log || echo "No scraping.log found"

    - name: Create failure issue
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          const title = `Daily Scraper Failed - ${date}`;

          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'workflow-failure'
          });

          const existingIssue = issues.data.find(i => i.title.includes('Daily Scraper Failed'));

          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `The Daily Scraper workflow failed on ${date}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and resolve the issue.`,
              labels: ['workflow-failure', 'automated']
            });
          }
